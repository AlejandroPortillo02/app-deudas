<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DebtFlow 2026 - Gestión de Deudas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a, #020617);
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .glass-hover:hover {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            transition: all 0.3s ease;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 custom-scrollbar">

    <!-- Auth Screen (Login/Register) -->
    <div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="glass p-8 rounded-3xl w-full max-w-md animate-fade-in">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent mb-2">
                    DebtFlow 2026
                </h1>
                <p id="auth-subtitle" class="text-slate-400">Inicia sesión para gestionar tus deudas</p>
            </div>
            
            <form id="auth-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Usuario</label>
                    <input type="text" id="username" required placeholder="Tu nombre" 
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1.5">Contraseña</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <button type="submit" id="auth-submit-btn"
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-xl transition-all shadow-lg shadow-indigo-500/25 flex items-center justify-center gap-2">
                    <i data-lucide="log-in" size="18"></i>
                    <span>Entrar</span>
                </button>
                <div class="text-center mt-4">
                    <button type="button" id="toggle-auth" class="text-sm text-indigo-400 hover:text-indigo-300 underline decoration-indigo-500/30 underline-offset-4">
                        ¿No tienes cuenta? Regístrate
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="main-app" class="max-w-6xl mx-auto hidden">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6 animate-fade-in">
            <div>
                <h1 class="text-4xl font-bold bg-gradient-to-r from-cyan-400 to-indigo-500 bg-clip-text text-transparent">
                    DebtFlow <span class="text-slate-500 text-lg font-medium">2026</span>
                </h1>
                <p id="welcome-msg" class="text-slate-400 mt-1">Controla tus finanzas.</p>
            </div>
            <div class="flex gap-4">
                <button onclick="logout()" class="p-3 bg-slate-800/50 hover:bg-rose-500/20 text-slate-400 hover:text-rose-400 rounded-xl transition-all border border-slate-700">
                    <i data-lucide="log-out"></i>
                </button>
                <div class="glass p-4 rounded-2xl flex items-center gap-4">
                    <div class="p-3 bg-indigo-500/20 rounded-xl text-indigo-400">
                        <i data-lucide="wallet"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Saldo Total</p>
                        <p id="total-amount" class="text-2xl font-bold">$0.00</p>
                    </div>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 animate-fade-in" style="animation-delay: 0.1s">
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-rose-500/20 rounded-lg text-rose-400"><i data-lucide="arrow-up-circle"></i></div>
                    <span id="pending-count" class="text-xs font-medium px-2 py-1 bg-rose-500/10 text-rose-400 rounded-full">0 Activas</span>
                </div>
                <h3 class="text-slate-400 text-sm font-medium">Deuda Pendiente</h3>
                <p id="pending-amount" class="text-2xl font-bold mt-1">$0.00</p>
            </div>
            <div class="glass p-6 rounded-2xl">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-emerald-500/20 rounded-lg text-emerald-400"><i data-lucide="check-circle"></i></div>
                    <span id="paid-count" class="text-xs font-medium px-2 py-1 bg-emerald-500/10 text-emerald-400 rounded-full">0 Abonos</span>
                </div>
                <h3 class="text-slate-400 text-sm font-medium">Total Abonado</h3>
                <p id="paid-amount" class="text-2xl font-bold mt-1">$0.00</p>
            </div>
            <div class="glass p-6 rounded-2xl border-indigo-500/30">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-cyan-500/20 rounded-lg text-cyan-400"><i data-lucide="trending-down"></i></div>
                    <span id="health-score" class="text-xs font-medium px-2 py-1 bg-cyan-500/10 text-cyan-400 rounded-full">100% Salud</span>
                </div>
                <h3 class="text-slate-400 text-sm font-medium">Ratio de Pago</h3>
                <div class="w-full bg-slate-700 h-2 rounded-full mt-3 overflow-hidden">
                    <div id="health-bar" class="bg-gradient-to-r from-cyan-400 to-indigo-500 h-full w-full transition-all duration-1000"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 animate-fade-in" style="animation-delay: 0.2s">
            <div class="lg:col-span-1">
                <div class="glass p-6 rounded-3xl sticky top-8">
                    <h2 class="text-xl font-semibold mb-6 flex items-center gap-2"><i data-lucide="plus-circle" class="text-indigo-400"></i> Nueva Deuda</h2>
                    <form id="debt-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1.5">Descripción</label>
                            <input type="text" id="debt-desc" required placeholder="Ej: Préstamo Banco" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Monto</label>
                                <input type="number" id="debt-amount" required step="0.01" placeholder="0.00" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5">Categoría</label>
                                <select id="debt-category" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none">
                                    <option value="Personal">Personal</option>
                                    <option value="Banco">Banco</option>
                                    <option value="Servicios">Servicios</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 rounded-xl transition-all shadow-lg flex items-center justify-center gap-2">
                            <i data-lucide="save" size="18"></i> Crear Registro
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6 rounded-3xl min-h-[600px]">
                    <div id="debt-list" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="payment-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
        <div class="glass p-6 rounded-3xl w-full max-w-sm animate-fade-in">
            <h3 id="modal-title" class="text-xl font-bold mb-4">Añadir Abono</h3>
            <div class="space-y-4">
                <div>
                    <label id="modal-label" class="block text-sm font-medium text-slate-400 mb-1.5">Cantidad</label>
                    <input type="number" id="modal-amount" step="0.01" placeholder="0.00" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none">
                </div>
                <div class="flex gap-3">
                    <button onclick="closeModal()" class="flex-1 px-4 py-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition-all font-semibold">Cancelar</button>
                    <button id="modal-confirm" class="flex-1 px-4 py-3 rounded-xl bg-indigo-600 hover:bg-indigo-500 transition-all font-semibold">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000/api';
        let currentUser = JSON.parse(localStorage.getItem('debtflow_user')) || null;
        let isLoginMode = true;

        // Auth elements
        const authScreen = document.getElementById('auth-screen');
        const mainApp = document.getElementById('main-app');
        const authForm = document.getElementById('auth-form');
        const toggleAuthBtn = document.getElementById('toggle-auth');
        const authSubtitle = document.getElementById('auth-subtitle');
        const authSubmitBtn = document.getElementById('auth-submit-btn');

        // Toggle Login/Register
        toggleAuthBtn.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            authSubtitle.textContent = isLoginMode ? 'Inicia sesión para gestionar tus deudas' : 'Crea una cuenta para empezar';
            authSubmitBtn.querySelector('span').textContent = isLoginMode ? 'Entrar' : 'Registrarse';
            authSubmitBtn.querySelector('i').setAttribute('data-lucide', isLoginMode ? 'log-in' : 'user-plus');
            toggleAuthBtn.textContent = isLoginMode ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia sesión';
            lucide.createIcons();
        });

        // Auth Logic
        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const endpoint = isLoginMode ? '/login' : '/register';

            try {
                const res = await fetch(API_URL + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    currentUser = data;
                    localStorage.setItem('debtflow_user', JSON.stringify(data));
                    initApp();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert('Error al conectar con el servidor. ¿Está corriendo el backend?');
            }
        });

        function logout() {
            localStorage.removeItem('debtflow_user');
            location.reload();
        }

        async function initApp() {
            if (currentUser) {
                authScreen.classList.add('hidden');
                mainApp.classList.remove('hidden');
                document.getElementById('welcome-msg').textContent = `Hola, ${currentUser.username}. Controla tus finanzas.`;
                await loadDebts();
            }
            lucide.createIcons();
        }

        async function loadDebts() {
            const res = await fetch(`${API_URL}/debts/${currentUser.id}`);
            const debts = await res.json();
            renderDebts(debts);
            updateStats(debts);
        }

        function renderDebts(debts) {
            const list = document.getElementById('debt-list');
            if (debts.length === 0) {
                list.innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-slate-500"><i data-lucide="inbox" size="48" class="mb-4 opacity-20"></i><p>No hay registros aún.</p></div>`;
                lucide.createIcons();
                return;
            }
            list.innerHTML = debts.map(debt => {
                const isPaid = parseFloat(debt.current_balance) <= 0;
                const totalPaid = debt.payments.reduce((acc, p) => acc + parseFloat(p.amount), 0);
                return `
                <div class="glass glass-hover p-6 rounded-2xl animate-fade-in border-l-4 ${isPaid ? 'border-l-emerald-500' : 'border-l-indigo-500'}">
                    <div class="flex flex-col sm:flex-row justify-between gap-4 mb-4">
                        <div class="flex-1">
                            <h4 class="font-bold text-xl text-slate-100 ${isPaid ? 'line-through opacity-50' : ''}">${debt.description}</h4>
                            <div class="flex flex-wrap gap-4 text-xs text-slate-400 mt-2">
                                <span>Total: $${parseFloat(debt.total_amount).toLocaleString()}</span>
                                <span class="text-emerald-400">Abonado: $${totalPaid.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-2xl font-black ${isPaid ? 'text-emerald-400' : 'text-slate-100'}">$${parseFloat(debt.current_balance).toLocaleString()}</p>
                            <p class="text-[10px] uppercase font-bold text-slate-500">${isPaid ? 'Saldado' : 'Pendiente'}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 pt-4 border-t border-slate-700/50">
                        <button onclick="openModal(${debt.id}, 'payment')" class="flex-1 bg-emerald-600/20 hover:bg-emerald-600 text-emerald-400 hover:text-white px-4 py-2 rounded-xl transition-all font-bold text-sm">Abonar</button>
                        <button onclick="openModal(${debt.id}, 'increase')" class="flex-1 bg-rose-600/20 hover:bg-rose-600 text-rose-400 hover:text-white px-4 py-2 rounded-xl transition-all font-bold text-sm">Pedir más</button>
                        <button onclick="deleteDebt(${debt.id})" class="p-2 bg-slate-800 hover:bg-rose-500/20 text-slate-500 hover:text-rose-400 rounded-xl transition-all"><i data-lucide="trash-2" size="18"></i></button>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function updateStats(debts) {
            const balance = debts.reduce((acc, d) => acc + parseFloat(d.current_balance), 0);
            const paid = debts.reduce((acc, d) => acc + d.payments.reduce((pAcc, p) => pAcc + parseFloat(p.amount), 0), 0);
            const total = debts.reduce((acc, d) => acc + parseFloat(d.total_amount), 0);
            
            document.getElementById('total-amount').textContent = `$${balance.toLocaleString()}`;
            document.getElementById('pending-amount').textContent = `$${balance.toLocaleString()}`;
            document.getElementById('paid-amount').textContent = `$${paid.toLocaleString()}`;
            document.getElementById('pending-count').textContent = `${debts.filter(d => d.current_balance > 0).length} Activas`;
            
            const health = total === 0 ? 100 : Math.round((paid / total) * 100);
            document.getElementById('health-score').textContent = `${health}% Salud`;
            document.getElementById('health-bar').style.width = `${health}%`;
        }

        // CRUD Logic
        document.getElementById('debt-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const description = document.getElementById('debt-desc').value;
            const amount = document.getElementById('debt-amount').value;
            const category = document.getElementById('debt-category').value;
            await fetch(`${API_URL}/debts`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: currentUser.id, description, amount, category })
            });
            document.getElementById('debt-form').reset();
            loadDebts();
        });

        let activeDebtId = null;
        let modalMode = 'payment';
        function openModal(id, mode) {
            activeDebtId = id;
            modalMode = mode;
            document.getElementById('modal-title').textContent = mode === 'payment' ? 'Añadir Abono' : 'Aumentar Deuda';
            document.getElementById('modal-amount').value = '';
            document.getElementById('payment-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('payment-modal').classList.add('hidden'); }

        document.getElementById('modal-confirm').onclick = async () => {
            const amount = document.getElementById('modal-amount').value;
            if (!amount) return;
            await fetch(`${API_URL}/transactions`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ debtId: activeDebtId, type: modalMode, amount })
            });
            closeModal();
            loadDebts();
        };

        async function deleteDebt(id) {
            if (confirm('¿Eliminar registro?')) {
                await fetch(`${API_URL}/debts/${id}`, { method: 'DELETE' });
                loadDebts();
            }
        }

        initApp();
    </script>
</body>
</html>
